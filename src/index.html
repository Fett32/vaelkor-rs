<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vaelkor</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">

      <!-- ── Header ───────────────────────────────────────────────────── -->
      <header id="header">
        <span class="logo">VAELKOR</span>
        <span class="session-meta" id="session-meta">—</span>
      </header>

      <!-- ── Sidebar: agents + tasks ─────────────────────────────────── -->
      <aside id="sidebar">
        <!-- Agents section -->
        <div class="panel-header">
          <span>Agents</span>
          <button id="btn-show-register">+</button>
        </div>
        <div id="agent-list">
          <p class="agent-empty">No agents registered.</p>
        </div>
        <form id="register-form" class="hidden" autocomplete="off">
          <input id="reg-id"      type="text" placeholder="Agent ID"       required />
          <input id="reg-name"    type="text" placeholder="Display name"   required />
          <input id="reg-tmux"    type="text" placeholder="tmux session (optional)" />
          <button type="submit">Register</button>
        </form>

        <!-- Tasks section -->
        <div class="panel-header task-header">
          <span>Tasks</span>
          <button id="btn-new-task">+</button>
        </div>
        <div id="task-controls">
          <input id="task-search" type="search" placeholder="Filter…" />
          <select id="task-filter-state">
            <option value="">All</option>
            <option value="ASSIGNED">Assigned</option>
            <option value="ACCEPTED">Accepted</option>
            <option value="COMPLETED">Completed</option>
            <option value="BLOCKED">Blocked</option>
            <option value="CANCELLED">Cancelled</option>
            <option value="STALE">Stale</option>
          </select>
        </div>
        <div id="task-list-scroll">
          <!-- TaskList renders here -->
        </div>
      </aside>

      <!-- ── Terminal: single xterm.js showing vaelkor-main ──────────── -->
      <section id="terminal-panel">
        <div id="terminal-container">
          <!-- single xterm.js instance -->
        </div>
      </section>

    </div><!-- #app -->

    <!-- ── New-task modal ────────────────────────────────────────────── -->
    <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div id="task-modal">
        <h2 id="modal-title">New Task</h2>
        <label>
          Title
          <input id="modal-title-input" type="text" placeholder="Short task title" required />
        </label>
        <label>
          Description
          <textarea id="modal-desc-input" rows="3" placeholder="What should the agent do?"></textarea>
        </label>
        <label>
          Assign to agent
          <select id="modal-agent-select">
            <option value="">— unassigned —</option>
          </select>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn-cancel-modal" id="btn-close-modal">Cancel</button>
          <button type="button" class="btn-submit"       id="btn-submit-task">Create</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
